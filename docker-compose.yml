services:
  bot:
    build: ./apps/bot
    restart: unless-stopped
    env_file: ./apps/bot/.env
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; from clients.redis import redis_client; asyncio.run(redis_client.ping())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
